# .github/workflows/merge-queue.yml
name: Merge Queue Checks

on:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false # Allow merge queue runs to write to cache
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Run checks and build debug APK
        run: ./gradlew app:detekt app:spotlessCheck :app:testDebugUnitTest :app:assembleDebug --parallel --continue --scan

      - name: Validate Screenshot Tests
        run: ./gradlew :app:validateDebugScreenshotTest --parallel --continue --no-configuration-cache

      - name: Upload Screenshot Diffs
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: screenshot-diffs
          path: app/build/outputs/screenshotTest/debug/preview/diffs/
          if-no-files-found: ignore

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: success() || failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
